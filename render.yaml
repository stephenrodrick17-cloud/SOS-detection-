services:
  - type: web
    name: road-damage-detection
    runtime: docker
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        generateValue: true
      - key: MODEL_PATH
        value: /app/model/weights/best.pt
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
